<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizarra Física + Sonidos (hols)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body{background:#0a0a0a;color:#fff;text-align:center;font-family:system-ui;margin:0;padding:10px;user-select:none;touch-action:manipulation}
        .bar{margin-bottom:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;background:#151515;padding:10px;border-radius:8px;border:1px solid #222}
        button,input{background:#252525;color:#ddd;border:1px solid #333;padding:8px 12px;cursor:pointer;border-radius:4px;font-weight:bold;transition:0.2s}
        input:focus{outline:none;border-color:#00ff88}
        button:hover{background:#3a3a3a} .active{background:#00ff88;color:#000;border-color:#00ff88;box-shadow:0 0 10px #00ff8844}
        .wrap{position:relative;width:100%;max-width:800px;aspect-ratio:8/5;margin:auto;background:#111;border-radius:8px;box-shadow:inset 0 0 40px #000, 0 10px 30px #0008;overflow:hidden;touch-action:none}
        canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:none}
        #fx{pointer-events:none}
        .grp{border-left:2px solid #333;padding-left:8px;display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
    </style>
</head>
<body>
    <div class="bar">
        <span>Sala:</span>
        <input type="text" id="roomId" placeholder="Ej: epic-123" style="width:120px">
        <button id="btnCreate" style="color:#00ff88">1. Crear</button>
        <button id="btnJoin" style="color:#00d9ff">2. Unirse</button>
        <span id="st" style="padding:4px 10px;background:#222;border-radius:4px;color:#ff3366">Desconectado</span>
    </div>
    
    <div class="bar">
        <input type="range" id="sz" min="2" max="40" value="12" title="Grosor">
        <button class="t active" data-t="pen">Muro</button>
        <button class="t" data-t="eraser">Goma</button>
        
        <div class="grp">
            <button class="t" data-t="wood" style="color:#c68a53">Madera</button>
            <button class="t" data-t="plant" style="color:#2ecc71">Planta</button>
            <button class="t" data-t="ice" style="color:#a0e6ff">Hielo</button>
        </div>

        <div class="grp">
            <button class="t" data-t="sand" style="color:#f1c40f">Arena</button>
            <button class="t" data-t="water" style="color:#3498db">Agua</button>
            <button class="t" data-t="acid" style="color:#00ff44">Ácido</button>
        </div>
        
        <div class="grp">
            <button class="t" data-t="gunp" style="color:#95a5a6">Pólvora</button>
            <button class="t" data-t="fire" style="color:#ff5500">Fuego</button>
            <button class="t" data-t="laser" style="color:#ff00ff;text-shadow:0 0 5px #ff00ff">⚡ Rayo</button>
            <button id="clr" style="background:#8b0000;margin-left:5px">🧨 Borrar</button>
        </div>
    </div>

    <div class="wrap">
        <canvas id="c" width="800" height="500"></canvas>
        <canvas id="fx" width="800" height="500"></canvas>
    </div>

    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently:true});
        const fx = document.getElementById('fx'), fctx = fx.getContext('2d');
        ctx.lineCap = ctx.lineJoin = 'round';
        
        let draw = 0, lx=0, ly=0, tool='pen', P=[], peer, conn;
        const sz = document.getElementById('sz'), st = document.getElementById('st');

        // SINTETIZADOR DE SONIDOS (Web Audio API)
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function playSnd(type) {
            if(actx.state === 'suspended') actx.resume();
            let osc = actx.createOscillator(), gain = actx.createGain();
            osc.connect(gain); gain.connect(actx.destination);
            
            let t = actx.currentTime;
            if(type === 'boom') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(10, t+0.5);
                gain.gain.setValueAtTime(0.5, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.5);
                osc.start(t); osc.stop(t+0.5);
            } else if(type === 'laser') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(100, t+0.2);
                gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.2);
                osc.start(t); osc.stop(t+0.2);
            } else if(type === 'burn') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(50, t); osc.frequency.linearRampToValueAtTime(100, t+0.1);
                gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0.01, t+0.1);
                osc.start(t); osc.stop(t+0.1);
            }
        }

        // INTERFAZ
        document.querySelectorAll('.t').forEach(b => b.onclick = e => {
            document.querySelectorAll('.t').forEach(x => x.classList.remove('active'));
            e.target.classList.add('active'); tool = e.target.dataset.t;
        });

        // CONEXIÓN P2P
        function setupConn() {
            conn.on('open', () => { st.innerText='¡Conectado!'; st.style.color='#00ff88'; });
            conn.on('data', d => { if(d.a=='d') doDraw(d.x, d.y, d.x1, d.y1, d.s, d.t, 1); else if(d.a=='c') eraseAll(1); else if(d.a=='x') boom(d.x, d.y, 1); });
            conn.on('close', () => { st.innerText='Desconectado'; st.style.color='#ff3366'; });
        }

        document.getElementById('btnCreate').onclick = () => {
            let id = document.getElementById('roomId').value.trim();
            if(!id) return alert("Escribe un nombre de sala");
            st.innerText = 'Creando...'; peer = new Peer(id);
            peer.on('open', () => { st.innerText = 'Esperando...'; st.style.color='#f1c40f'; });
            peer.on('connection', c => { conn = c; setupConn(); });
        };

        document.getElementById('btnJoin').onclick = () => {
            let id = document.getElementById('roomId').value.trim();
            if(!id) return alert("Escribe la sala");
            if(!peer) peer = new Peer();
            st.innerText = 'Conectando...'; setTimeout(() => { conn = peer.connect(id); setupConn(); }, 500);
        };

        function varyColor(t) {
            const cols = {
                'wood':['#8B4513','#A0522D','#CD853F'], 'sand':['#F1C40F','#E67E22'], 'water':['#3498DB','#2980B9'], 
                'acid':['#00ff44','#27AE60'], 'gunp':['#7F8C8D','#555'], 'fire':['#ff5500','#ff2200','#ffaa00'], 
                'plant':['#2ecc71','#229954','#1e8449'], 'ice':['#a0e6ff','#e0f7fa'], 'laser':['#ff00ff','#ffffff']
            };
            let p = cols[t] || ['#fff']; return p[Math.floor(Math.random()*p.length)];
        }

        function boom(x, y, rem=0) {
            playSnd('boom');
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 70, 0, 7); ctx.fill(); 
            ctx.globalCompositeOperation = 'source-over';
            for(let i=0; i<80; i++) P.push({x:x, y:y, vx:(Math.random()-0.5)*25, vy:(Math.random()-0.5)*25, c:varyColor('fire'), t:'fire', l:50});
            if(!rem && conn && conn.open) conn.send({a:'x', x, y});
        }

        function putPixel(x, y, t, s) { ctx.fillStyle = varyColor(t); ctx.fillRect(x, y, s, s); }
        function delPixel(x, y, s) { ctx.clearRect(x, y, s, s); }

        function doDraw(x, y, x1, y1, s, t, rem=0) {
            if(t=='laser') { playSnd('laser'); for(let i=0; i<15; i++) P.push({x:x1+(Math.random()-0.5)*10, y:y1, vx:0, vy:20, c:'#ff00ff', t:'laser', l:10}); }
            else if(t=='pen' || t=='wood' || t=='plant' || t=='ice') {
                ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x1, y1); ctx.lineWidth = s; ctx.strokeStyle = varyColor(t); ctx.stroke();
            } else if(t=='eraser') {
                ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x1, y1); ctx.lineWidth = s; ctx.globalCompositeOperation = 'destination-out'; ctx.stroke(); ctx.globalCompositeOperation = 'source-over';
            } else {
                for(let i=0; i<s; i++) P.push({x:x1+(Math.random()-0.5)*s, y:y1+(Math.random()-0.5)*s, vx:0, vy:0, c:varyColor(t), t:t, l:100});
            }
            if(!rem && conn && conn.open) conn.send({a:'d', x, y, x1, y1, s, t});
        }

        function eraseAll(rem=0) { ctx.clearRect(0,0,800,500); P=[]; if(!rem && conn && conn.open) conn.send({a:'c'}); }
        document.getElementById('clr').onclick = () => eraseAll();

        // FÍSICAS MAGISTRALES
        function loop() {
            fctx.clearRect(0,0,800,500);
            if(P.length > 0) {
                let img = ctx.getImageData(0,0,800,500).data;
                let i = P.length;
                while(i--) {
                    let p = P[i], S = 4;
                    let idx = (Math.floor(p.y)*800 + Math.floor(p.x))*4;
                    let R = img[idx], G = img[idx+1], B = img[idx+2], A = img[idx+3];

                    // Laser atraviesa todo
                    if(p.t == 'laser') {
                        p.y += p.vy; p.l--; delPixel(p.x-S, p.y-S, S*3); // Destruye al pasar
                        if(p.y>500 || p.l<=0) P.splice(i,1);
                        else { fctx.fillStyle = p.c; fctx.fillRect(p.x, p.y, S, S*3); }
                    }
                    // Fuego
                    else if(p.t == 'fire') {
                        p.x += p.vx + (Math.random()-0.5)*2; p.y += p.vy - Math.random()*2; p.l -= 2;
                        if(A>50) {
                            if(R>100 && G<110 && B<110) { boom(p.x, p.y); p.l=0; } // Pólvora
                            else if(R>120 && G>50 && B<50) { delPixel(p.x, p.y, S*2); p.l+=5; if(Math.random()<0.1)playSnd('burn'); } // Quema madera
                            else if(G>120 && R<100) { delPixel(p.x, p.y, S*2); p.l+=10; } // Quema planta muy rápido
                            else if(R>150 && G>220 && B>240) { delPixel(p.x, p.y, S*2); P.push({x:p.x, y:p.y, vx:0, vy:0, c:'#3498db', t:'water', l:100}); p.l=0; } // Derrite hielo
                        }
                        if(p.l<=0) P.splice(i,1);
                        else { fctx.fillStyle = p.c; fctx.globalAlpha = p.l/100; fctx.fillRect(p.x, p.y, S, S); fctx.globalAlpha = 1; }
                    } 
                    else {
                        let down = p.y+S>=500 || img[(Math.floor(p.y+S)*800 + Math.floor(p.x))*4 + 3] > 50;
                        
                        // Ácido come
                        if(p.t == 'acid' && down && p.y+S<500) {
                            delPixel(p.x-S/2, p.y+S, S*2); if(Math.random()<0.1)playSnd('burn');
                            if(Math.random()<0.1) P.splice(i,1); 
                        }

                        // Interacciones de Agua
                        if(p.t == 'water' && A>50) {
                            if(G>120 && R<100) { putPixel(p.x + (Math.random()-0.5)*S*4, p.y-S, 'plant', S*2); P.splice(i,1); continue; } // Planta crece
                            if(R>150 && G>220 && B>240) { putPixel(p.x, p.y, 'ice', S); P.splice(i,1); continue; } // Se congela
                        }

                        if(!down) { p.y += S; p.x += p.vx; } 
                        else {
                            let L = img[(Math.floor(p.y+S)*800 + Math.floor(p.x-S))*4 + 3] > 50;
                            let Rg = img[(Math.floor(p.y+S)*800 + Math.floor(p.x+S))*4 + 3] > 50;
                            if(!L && Rg) p.x -= S; else if(L && !Rg) p.x += S; else if(!L && !Rg) p.x += Math.random()>0.5?S:-S;
                            else if(p.t=='water' || p.t=='acid') {
                                let wL = img[(Math.floor(p.y)*800 + Math.floor(p.x-S))*4 + 3] > 50;
                                let wR = img[(Math.floor(p.y)*800 + Math.floor(p.x+S))*4 + 3] > 50;
                                if(!wL && wR) p.x -= S; else if(wL && !wR) p.x += S;
                                else if (p.t!='acid') { putPixel(p.x,p.y,p.t,S); P.splice(i,1); }
                            } 
                            else { putPixel(p.x,p.y,p.t,S); P.splice(i,1); }
                        }
                        if(P[i]) { fctx.fillStyle=p.c; fctx.fillRect(p.x,p.y,S,S); }
                    }
                }
            }
            requestAnimationFrame(loop);
        }
        loop();

        // CONTROLES DE DIBUJO (PC Y CELULAR)
        function getPos(e) {
            let rect = c.getBoundingClientRect();
            let evt = e.touches ? e.touches[0] : e;
            return {
                x: (evt.clientX - rect.left) * (c.width / rect.width),
                y: (evt.clientY - rect.top) * (c.height / rect.height)
            };
        }

        function startDraw(e) {
            if(e.cancelable) e.preventDefault(); // Evita que la pantalla se mueva
            draw = 1; let pos = getPos(e); lx = pos.x; ly = pos.y; actx.resume();
            doDraw(lx, ly, lx, ly, sz.value, tool);
        }

        function moveDraw(e) {
            if(!draw) return;
            if(e.cancelable) e.preventDefault();
            let pos = getPos(e); doDraw(lx, ly, pos.x, pos.y, sz.value, tool);
            lx = pos.x; ly = pos.y;
        }

        function endDraw() { draw = 0; }

        // Eventos para PC (Mouse)
        c.addEventListener('mousedown', startDraw);
        c.addEventListener('mousemove', moveDraw);
        window.addEventListener('mouseup', endDraw);

        // Eventos para Celular (Touch)
        c.addEventListener('touchstart', startDraw, {passive: false});
        c.addEventListener('touchmove', moveDraw, {passive: false});
        window.addEventListener('touchend', endDraw);

    </script>
</body>
</html>
